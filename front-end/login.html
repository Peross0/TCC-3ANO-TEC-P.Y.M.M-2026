<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JobConnect — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: #185FA5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      padding: 2rem;
    }

    .card-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .card-header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .card-header p {
      font-size: 14px;
      color: #6b7280;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #f9fafb;
      color: #111827;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #185FA5;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(24,95,165,0.1);
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .label-row label {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
    }

    .label-row a {
      font-size: 12px;
      color: #185FA5;
      text-decoration: none;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .remember input { width: 15px; height: 15px; accent-color: #185FA5; cursor: pointer; }
    .remember label { font-size: 13px; color: #6b7280; cursor: pointer; }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: #185FA5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #145189; } 
    .btn-primary:disabled { background: #93b8d8; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.25rem 0;
    }

    .divider hr { flex: 1; border: none; border-top: 1px solid #e5e7eb; }
    .divider span { font-size: 12px; color: #9ca3af; }

    .social-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-social {
      padding: 9px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }

    .btn-social:hover { background: #f3f4f6; }

    .footer-text {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-top: 1.25rem;
    }

    .footer-text a {
      color: #185FA5;
      text-decoration: none;
      font-weight: 500;
    }

    /* Mensagem de erro/sucesso */
    .alert {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 1rem;
      display: none;
    }

    .alert.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .alert.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
  </style>
</head>
<body>
  <div class="container">

    <div class="brand">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M20 7H4C2.9 7 2 7.9 2 9V19C2 20.1 2.9 21 4 21H20C21.1 21 22 20.1 22 19V9C22 7.9 21.1 7 20 7Z" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M16 7V5C16 3.9 15.1 3 14 3H10C8.9 3 8 3.9 8 5V7" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="12" y1="12" x2="12" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="10" y1="14" x2="14" y2="14" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="brand-name">JobConnect</span>
    </div>

    <div class="card">
      <div class="card-header">
        <h1>Bem-vindo de volta</h1>
        <p>Entre na sua conta para continuar</p>
      </div>

      <div class="alert" id="alert"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required />
        </div>

        <div class="form-group">
          <div class="label-row">
            <label for="senha">Senha</label>
            <a href="/esqueci-senha">Esqueceu a senha?</a>
          </div>
          <input type="password" id="senha" name="senha" placeholder="••••••••" required />
        </div>

        <div class="remember">
          <input type="checkbox" id="lembrar" name="lembrar" />
          <label for="lembrar">Lembrar meus dados</label>
        </div>

        <button type="submit" class="btn-primary" id="btnLogin">Entrar</button>
      </form>

      <div class="divider">
        <hr /><span>ou continue com</span><hr />
      </div>

      <div class="social-grid">
        <button class="btn-social">
          <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="btn-social">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          LinkedIn
        </button>
      </div>
    </div>

    <p class="footer-text">
      Não tem uma conta?
      <a href="/cadastro">Cadastre-se gratuitamente</a>
    </p>

  </div>

  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('btnLogin');
    const alert = document.getElementById('alert');

    function showAlert(msg, type) {
      alert.textContent = msg;
      alert.className = 'alert ' + type;
      alert.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alert.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const lembrar = document.getElementById('lembrar').checked;

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha, lembrar })
        });

        const data = await res.json();

        if (res.ok) {
          // Salva o token recebido do backend
          localStorage.setItem('token', data.token);
          showAlert('Login realizado com sucesso! Redirecionando...', 'success');
          setTimeout(() => window.location.href = '/dashboard', 1500);
        } else {
          showAlert(data.mensagem || 'E-mail ou senha inválidos.', 'error');
        }
      } catch (err) {
        showAlert('Erro ao conectar com o servidor. Tente novamente.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
